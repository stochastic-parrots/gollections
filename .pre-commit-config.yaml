repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: go-lint
        name: lint golang files
        entry: golangci-lint
        args: ["run", "./..."]
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: test golang files
        entry: go
        args: ["test", "-race", "-v", "./..."]
        language: system
        types: [go]
        pass_filenames: false
