name: Bug report
description: Report incorrect behavior or a regression in gollections.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction so the behavior can be verified quickly.
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I checked the relevant package documentation or README guidance.
          required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include a small Go snippet, failing test, or command sequence.
      render: go
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Package or data structure
      placeholder: prioritymap, heap, deque, list, internal/prioritymap
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go version
  - type: textarea
    id: verification
    attributes:
      label: Verification output
      description: Paste relevant `go test` output, stack traces, or failure messages.
      render: text
